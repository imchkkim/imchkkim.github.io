<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg10" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="160" fill="url(#bg10)" rx="10"/>
  <!-- Wide prior (ignorance) -->
  <g transform="translate(30,20)">
    <text x="80" y="10" fill="#3b82f6" font-size="10" text-anchor="middle">사전분포 (무지)</text>
    <path d="M 10 100 Q 40 30, 80 50 Q 120 70, 150 100" stroke="#3b82f6" stroke-width="1.5" fill="#3b82f6" fill-opacity="0.08"/>
    <text x="80" y="115" fill="#60a5fa" font-size="9" text-anchor="middle">넓게 퍼진 믿음</text>
  </g>
  <!-- Arrow: data -->
  <g transform="translate(195,60)">
    <text x="0" y="-5" fill="#f59e0b" font-size="9" text-anchor="middle">× 데이터</text>
    <line x1="-15" y1="5" x2="15" y2="5" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr10)"/>
  </g>
  <defs>
    <marker id="arr10" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M 0 0 L 6 2.5 L 0 5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
    </marker>
  </defs>
  <!-- Narrow posterior (certainty) -->
  <g transform="translate(230,20)">
    <text x="80" y="10" fill="#ef4444" font-size="10" text-anchor="middle">사후분포 (확신)</text>
    <path d="M 30 100 Q 60 100, 75 30 Q 90 100, 130 100" stroke="#ef4444" stroke-width="1.5" fill="#ef4444" fill-opacity="0.08"/>
    <text x="80" y="115" fill="#f87171" font-size="9" text-anchor="middle">좁게 집중된 믿음</text>
  </g>
  <text x="210" y="150" fill="#64748b" font-size="10" text-anchor="middle">데이터가 무지를 확신으로 바꾼다 — 역방향 확률</text>
</svg>
