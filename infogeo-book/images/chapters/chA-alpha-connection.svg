<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 180" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bgA" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="axisGrad" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0%" stop-color="#ef4444"/>
      <stop offset="50%" stop-color="#f59e0b"/>
      <stop offset="100%" stop-color="#3b82f6"/>
    </linearGradient>
  </defs>

  <rect width="480" height="180" fill="url(#bgA)" rx="12"/>
  <text x="240" y="28" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="600">α-접속의 연속체</text>

  <!-- Main axis -->
  <line x1="60" y1="90" x2="420" y2="90" stroke="url(#axisGrad)" stroke-width="3" stroke-linecap="round"/>

  <!-- Tick marks and labels -->
  <!-- α = -1 (m-connection) -->
  <line x1="90" y1="80" x2="90" y2="100" stroke="#ef4444" stroke-width="2"/>
  <circle cx="90" cy="90" r="6" fill="#ef4444"/>
  <text x="90" y="70" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">α = −1</text>
  <text x="90" y="118" fill="#f87171" font-size="9" text-anchor="middle">m-접속</text>
  <text x="90" y="132" fill="#94a3b8" font-size="8" text-anchor="middle">(혼합의 길)</text>

  <!-- α = 0 (Levi-Civita) -->
  <line x1="240" y1="80" x2="240" y2="100" stroke="#f59e0b" stroke-width="2"/>
  <circle cx="240" cy="90" r="6" fill="#f59e0b"/>
  <text x="240" y="70" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">α = 0</text>
  <text x="240" y="118" fill="#fbbf24" font-size="9" text-anchor="middle">Levi-Civita</text>
  <text x="240" y="132" fill="#94a3b8" font-size="8" text-anchor="middle">(리만 측지선)</text>

  <!-- α = +1 (e-connection) -->
  <line x1="390" y1="80" x2="390" y2="100" stroke="#3b82f6" stroke-width="2"/>
  <circle cx="390" cy="90" r="6" fill="#3b82f6"/>
  <text x="390" y="70" fill="#3b82f6" font-size="11" text-anchor="middle" font-weight="600">α = +1</text>
  <text x="390" y="118" fill="#60a5fa" font-size="9" text-anchor="middle">e-접속</text>
  <text x="390" y="132" fill="#94a3b8" font-size="8" text-anchor="middle">(지수의 길)</text>

  <!-- Duality arrow -->
  <path d="M 110 150 Q 240 165, 370 150" stroke="#8b5cf6" stroke-width="1" fill="none" stroke-dasharray="4 3"/>
  <text x="240" y="168" fill="#a78bfa" font-size="9" text-anchor="middle">쌍대: ∇⁽⁻¹⁾ ↔ ∇⁽⁺¹⁾</text>

  <!-- Arrow tips on main axis -->
  <polygon points="420,90 412,84 412,96" fill="#3b82f6" opacity="0.7"/>
  <polygon points="60,90 68,84 68,96" fill="#ef4444" opacity="0.7"/>
</svg>
