<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg15" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="150" fill="url(#bg15)" rx="10"/>
  <!-- Left: noise cloud -->
  <g transform="translate(50,65)">
    <circle cx="0" cy="0" r="30" fill="#64748b" fill-opacity="0.1" stroke="#475569" stroke-width="0.8"/>
    <g fill="#64748b" opacity="0.5">
      <circle cx="-10" cy="-8" r="2"/><circle cx="8" cy="5" r="2"/><circle cx="-5" cy="12" r="2"/>
      <circle cx="12" cy="-10" r="2"/><circle cx="-12" cy="3" r="2"/>
    </g>
    <text x="0" y="45" fill="#94a3b8" font-size="9" text-anchor="middle">노이즈 z₀</text>
  </g>
  <!-- Straight flow lines -->
  <g stroke="#f59e0b" stroke-width="1.2" fill="none" opacity="0.6">
    <line x1="85" y1="50" x2="325" y2="40" marker-end="url(#arr15)"/>
    <line x1="90" y1="65" x2="330" y2="60" marker-end="url(#arr15)"/>
    <line x1="85" y1="80" x2="325" y2="85" marker-end="url(#arr15)"/>
    <line x1="80" y1="70" x2="320" y2="70" marker-end="url(#arr15)"/>
  </g>
  <text x="210" y="35" fill="#fbbf24" font-size="9" text-anchor="middle">직선 경로 v(t)</text>
  <defs>
    <marker id="arr15" markerWidth="5" markerHeight="4" refX="5" refY="2" orient="auto">
      <path d="M 0 0 L 5 2 L 0 4" fill="none" stroke="#f59e0b" stroke-width="0.6"/>
    </marker>
  </defs>
  <!-- Right: data shape -->
  <g transform="translate(360,65)">
    <path d="M -20 -20 Q -10 -30, 5 -25 Q 20 -20, 25 -5 Q 28 10, 15 20 Q 5 28, -10 22 Q -25 15, -25 0 Z"
          fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.2"/>
    <g fill="#f59e0b" opacity="0.7">
      <circle cx="-8" cy="-10" r="2"/><circle cx="10" cy="-8" r="2"/><circle cx="5" cy="10" r="2"/>
      <circle cx="-10" cy="8" r="2"/><circle cx="15" cy="5" r="2"/>
    </g>
    <text x="0" y="45" fill="#94a3b8" font-size="9" text-anchor="middle">데이터 z₁</text>
  </g>
  <text x="210" y="140" fill="#64748b" font-size="10" text-anchor="middle">노이즈에서 데이터로 — 직선으로 흐르는 강물</text>
</svg>
