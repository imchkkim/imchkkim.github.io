<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 150" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg5" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="150" fill="url(#bg5)" rx="10"/>
  <!-- Low surprise: sun rises -->
  <g transform="translate(80,65)">
    <circle cx="0" cy="0" r="28" fill="#f59e0b" fill-opacity="0.1" stroke="#f59e0b" stroke-width="1"/>
    <!-- Sun icon -->
    <circle cx="0" cy="-4" r="10" fill="#f59e0b" fill-opacity="0.4"/>
    <g stroke="#f59e0b" stroke-width="1.2" opacity="0.4">
      <line x1="0" y1="-20" x2="0" y2="-24"/><line x1="11" y1="-15" x2="14" y2="-18"/>
      <line x1="16" y1="-4" x2="20" y2="-4"/><line x1="11" y1="7" x2="14" y2="10"/>
      <line x1="-11" y1="-15" x2="-14" y2="-18"/><line x1="-16" y1="-4" x2="-20" y2="-4"/>
      <line x1="-11" y1="7" x2="-14" y2="10"/>
    </g>
    <text x="0" y="18" fill="#fbbf24" font-size="8" text-anchor="middle">p ≈ 1</text>
    <text x="0" y="48" fill="#94a3b8" font-size="9" text-anchor="middle">해가 뜬다</text>
    <text x="0" y="62" fill="#475569" font-size="9" text-anchor="middle">놀라움 ≈ 0</text>
  </g>
  <!-- Medium surprise -->
  <g transform="translate(200,65)">
    <circle cx="0" cy="0" r="28" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="1"/>
    <text x="0" y="-4" fill="#a78bfa" font-size="18" text-anchor="middle">!</text>
    <text x="0" y="18" fill="#a78bfa" font-size="8" text-anchor="middle">p ≈ 0.1</text>
    <text x="0" y="48" fill="#94a3b8" font-size="9" text-anchor="middle">서울에 눈</text>
    <text x="0" y="62" fill="#475569" font-size="9" text-anchor="middle">놀라움 보통</text>
  </g>
  <!-- High surprise -->
  <g transform="translate(320,65)">
    <circle cx="0" cy="0" r="28" fill="#ef4444" fill-opacity="0.15" stroke="#ef4444" stroke-width="1.5"/>
    <text x="0" y="-1" fill="#f87171" font-size="22" text-anchor="middle" font-weight="700">‼</text>
    <text x="0" y="18" fill="#f87171" font-size="8" text-anchor="middle">p ≈ 0.001</text>
    <text x="0" y="48" fill="#94a3b8" font-size="9" text-anchor="middle">운석 충돌</text>
    <text x="0" y="62" fill="#475569" font-size="9" text-anchor="middle">놀라움 극대</text>
  </g>
  <!-- Bottom formula -->
  <text x="200" y="140" fill="#64748b" font-size="10" text-anchor="middle">놀라움 = −log p  :  드물수록 놀랍다</text>
</svg>
