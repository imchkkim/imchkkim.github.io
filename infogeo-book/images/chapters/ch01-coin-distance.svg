<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg1c" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="160" fill="url(#bg1c)" rx="10"/>
  <!-- Coin 1: fair -->
  <g transform="translate(80,80)">
    <ellipse cx="0" cy="0" rx="36" ry="36" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.5"/>
    <text x="0" y="-8" fill="#fbbf24" font-size="20" text-anchor="middle" font-weight="700">½</text>
    <text x="0" y="12" fill="#fbbf24" font-size="10" text-anchor="middle">½</text>
    <text x="0" y="52" fill="#94a3b8" font-size="10" text-anchor="middle">공정한 동전</text>
  </g>
  <!-- Distance arrow -->
  <g>
    <line x1="130" y1="80" x2="270" y2="80" stroke="#8b5cf6" stroke-width="1.5" stroke-dasharray="6 4"/>
    <polygon points="270,80 262,76 262,84" fill="#8b5cf6"/>
    <polygon points="130,80 138,76 138,84" fill="#8b5cf6"/>
    <text x="200" y="72" fill="#a78bfa" font-size="11" text-anchor="middle">얼마나 다른가?</text>
  </g>
  <!-- Coin 2: biased -->
  <g transform="translate(320,80)">
    <ellipse cx="0" cy="0" rx="36" ry="36" fill="#3b82f6" fill-opacity="0.15" stroke="#3b82f6" stroke-width="1.5"/>
    <text x="0" y="-8" fill="#60a5fa" font-size="20" text-anchor="middle" font-weight="700">0.7</text>
    <text x="0" y="12" fill="#60a5fa" font-size="10" text-anchor="middle">0.3</text>
    <text x="0" y="52" fill="#94a3b8" font-size="10" text-anchor="middle">편향된 동전</text>
  </g>
</svg>
