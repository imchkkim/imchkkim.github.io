<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 320" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <linearGradient id="surface" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#8b5cf6" stop-opacity="0.15"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="3" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="480" height="320" fill="url(#bg)" rx="12"/>

  <!-- Loss surface contour lines -->
  <g stroke="#3b82f6" fill="none" opacity="0.3" stroke-width="0.8">
    <!-- Outer contours - basin 1 (left) -->
    <ellipse cx="150" cy="180" rx="100" ry="70" transform="rotate(-15 150 180)"/>
    <ellipse cx="150" cy="180" rx="75" ry="52" transform="rotate(-15 150 180)"/>
    <ellipse cx="150" cy="180" rx="50" ry="35" transform="rotate(-15 150 180)"/>
    <ellipse cx="150" cy="180" rx="25" ry="18" transform="rotate(-15 150 180)"/>
    <!-- Basin 2 (right) -->
    <ellipse cx="340" cy="200" rx="80" ry="55" transform="rotate(10 340 200)"/>
    <ellipse cx="340" cy="200" rx="55" ry="38" transform="rotate(10 340 200)"/>
    <ellipse cx="340" cy="200" rx="30" ry="20" transform="rotate(10 340 200)"/>
  </g>

  <!-- Saddle ridge between basins -->
  <path d="M 220 140 Q 250 170 280 155" stroke="#6366f1" stroke-width="1" fill="none" opacity="0.4" stroke-dasharray="4 3"/>

  <!-- Trajectory: gradient descent path -->
  <path d="M 90 120 C 110 130, 120 150, 130 160 S 145 175, 148 178"
        stroke="#f59e0b" stroke-width="2.5" fill="none" stroke-linecap="round" filter="url(#glow)"/>

  <!-- Starting point -->
  <circle cx="90" cy="120" r="5" fill="#ef4444" stroke="#ef4444" stroke-width="1" opacity="0.9"/>
  <text x="70" y="110" fill="#ef4444" font-size="10" text-anchor="middle">초기화</text>

  <!-- Local minimum 1 -->
  <circle cx="148" cy="178" r="4" fill="#f59e0b"/>
  <text x="148" y="198" fill="#f59e0b" font-size="9" text-anchor="middle">극솟값</text>

  <!-- Global minimum -->
  <circle cx="340" cy="200" r="4" fill="#22c55e"/>
  <text x="340" y="220" fill="#22c55e" font-size="9" text-anchor="middle">전역 최솟값</text>

  <!-- Alternative path (LoRA/merge) -->
  <path d="M 148 178 Q 230 140, 260 160 Q 290 180, 340 200"
        stroke="#8b5cf6" stroke-width="1.5" fill="none" stroke-dasharray="6 4" opacity="0.7"/>
  <text x="235" y="135" fill="#8b5cf6" font-size="9" text-anchor="middle">모델 보간 경로</text>

  <!-- Axes labels -->
  <text x="430" y="290" fill="#64748b" font-size="10">θ₁</text>
  <text x="30" y="50" fill="#64748b" font-size="10">θ₂</text>

  <!-- Title -->
  <text x="240" y="30" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="600">파라미터 공간의 손실 지형</text>
</svg>
