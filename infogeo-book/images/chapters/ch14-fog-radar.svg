<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg14" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="fog" cx="50%" cy="50%" r="50%">
      <stop offset="0%" stop-color="#94a3b8" stop-opacity="0.3"/>
      <stop offset="100%" stop-color="#94a3b8" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <rect width="420" height="160" fill="url(#bg14)" rx="10"/>
  <!-- Left: noisy (fog) -->
  <g transform="translate(40,20)">
    <rect x="0" y="0" width="120" height="100" rx="6" fill="url(#fog)" stroke="#475569" stroke-width="0.5"/>
    <g fill="#64748b" opacity="0.4">
      <circle cx="30" cy="30" r="2"/><circle cx="50" cy="50" r="2"/><circle cx="80" cy="25" r="2"/>
      <circle cx="70" cy="70" r="2"/><circle cx="40" cy="80" r="2"/><circle cx="100" cy="40" r="2"/>
      <circle cx="20" cy="60" r="2"/><circle cx="90" cy="85" r="2"/><circle cx="60" cy="40" r="2"/>
    </g>
    <text x="60" y="115" fill="#94a3b8" font-size="9" text-anchor="middle">노이즈 속의 데이터</text>
  </g>
  <!-- Arrow -->
  <g transform="translate(185,60)">
    <text x="0" y="-5" fill="#f59e0b" font-size="9" text-anchor="middle">∇log p</text>
    <line x1="-15" y1="5" x2="20" y2="5" stroke="#f59e0b" stroke-width="1.5" marker-end="url(#arr14)"/>
    <text x="0" y="20" fill="#94a3b8" font-size="8" text-anchor="middle">스코어 함수</text>
  </g>
  <defs>
    <marker id="arr14" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M 0 0 L 6 2.5 L 0 5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
    </marker>
  </defs>
  <!-- Right: denoised (clear) -->
  <g transform="translate(260,20)">
    <rect x="0" y="0" width="120" height="100" rx="6" fill="#3b82f6" fill-opacity="0.04" stroke="#3b82f6" stroke-width="0.8"/>
    <!-- Clear shape emerging -->
    <path d="M 30 80 Q 40 30, 60 25 Q 80 20, 90 50 Q 95 70, 80 85 Z" fill="#f59e0b" fill-opacity="0.15" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="60" y="115" fill="#94a3b8" font-size="9" text-anchor="middle">복원된 구조</text>
  </g>
  <text x="210" y="152" fill="#64748b" font-size="10" text-anchor="middle">안개 속 레이더 — ∇log p가 데이터의 방향을 알려준다</text>
</svg>
