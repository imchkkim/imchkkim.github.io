<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 150" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg3m" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="150" fill="url(#bg3m)" rx="10"/>
  <!-- Walkway base -->
  <rect x="40" y="70" width="340" height="20" rx="4" fill="#334155" stroke="#475569" stroke-width="0.8"/>
  <!-- Moving arrows on walkway -->
  <g fill="#3b82f6" opacity="0.4">
    <polygon points="100,80 110,75 110,85"/>
    <polygon points="160,80 170,75 170,85"/>
    <polygon points="220,80 230,75 230,85"/>
    <polygon points="280,80 290,75 290,85"/>
    <polygon points="340,80 350,75 350,85"/>
  </g>
  <!-- Person going right (with flow) -->
  <g transform="translate(130,52)">
    <circle cx="0" cy="0" r="10" fill="#22c55e" fill-opacity="0.2" stroke="#22c55e" stroke-width="1.5"/>
    <text x="0" y="4" fill="#22c55e" font-size="12" text-anchor="middle">→</text>
  </g>
  <text x="130" y="115" fill="#4ade80" font-size="10" text-anchor="middle">순방향: 3분</text>
  <!-- Person going left (against flow) -->
  <g transform="translate(290,52)">
    <circle cx="0" cy="0" r="10" fill="#ef4444" fill-opacity="0.2" stroke="#ef4444" stroke-width="1.5"/>
    <text x="0" y="4" fill="#ef4444" font-size="12" text-anchor="middle">←</text>
  </g>
  <text x="290" y="115" fill="#f87171" font-size="10" text-anchor="middle">역방향: 10분</text>
  <!-- Labels -->
  <text x="30" y="84" fill="#94a3b8" font-size="9">A</text>
  <text x="390" y="84" fill="#94a3b8" font-size="9">B</text>
  <text x="210" y="140" fill="#64748b" font-size="10" text-anchor="middle">같은 두 점, 방향에 따라 다른 거리 — KL 발산</text>
</svg>
