<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg12" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="170" fill="url(#bg12)" rx="10"/>
  <!-- e-flat (horizontal) -->
  <line x1="40" y1="130" x2="380" y2="130" stroke="#3b82f6" stroke-width="1"/>
  <text x="390" y="134" fill="#60a5fa" font-size="9">e-평면</text>
  <!-- m-flat (diagonal) -->
  <line x1="60" y1="30" x2="350" y2="80" stroke="#ef4444" stroke-width="1"/>
  <text x="360" y="78" fill="#f87171" font-size="9">m-평면</text>
  <!-- EM zigzag path -->
  <circle cx="100" cy="130" r="4" fill="#f59e0b"/>
  <text x="100" y="148" fill="#fbbf24" font-size="8" text-anchor="middle">θ₀</text>
  <!-- E-step: project to m -->
  <line x1="100" y1="126" x2="120" y2="48" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="120" cy="48" r="3" fill="#f59e0b"/>
  <!-- M-step: project to e -->
  <line x1="120" y1="48" x2="200" y2="130" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="200" cy="130" r="3" fill="#f59e0b"/>
  <!-- E-step 2 -->
  <line x1="200" y1="126" x2="215" y2="58" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="215" cy="58" r="3" fill="#f59e0b"/>
  <!-- M-step 2 -->
  <line x1="215" y1="58" x2="270" y2="130" stroke="#f59e0b" stroke-width="1.5"/>
  <circle cx="270" cy="130" r="3" fill="#f59e0b"/>
  <!-- E-step 3 -->
  <line x1="270" y1="126" x2="278" y2="66" stroke="#f59e0b" stroke-width="1.2" opacity="0.6"/>
  <circle cx="278" cy="66" r="2.5" fill="#f59e0b" opacity="0.6"/>
  <!-- Convergence point -->
  <circle cx="300" cy="130" r="5" fill="#22c55e" stroke="#22c55e" stroke-width="1"/>
  <text x="300" y="148" fill="#4ade80" font-size="8" text-anchor="middle">수렴점</text>
  <!-- Labels -->
  <text x="140" y="90" fill="#fbbf24" font-size="8" transform="rotate(-60 140 90)">E-step</text>
  <text x="170" y="100" fill="#fbbf24" font-size="8" transform="rotate(45 170 100)">M-step</text>
  <text x="210" y="165" fill="#64748b" font-size="10" text-anchor="middle">EM 알고리즘 = e-사영과 m-사영의 교대 반복</text>
</svg>
