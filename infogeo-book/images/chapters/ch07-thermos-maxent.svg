<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 160" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg7" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="160" fill="url(#bg7)" rx="10"/>
  <!-- Constraint surface -->
  <ellipse cx="200" cy="75" rx="140" ry="50" fill="#3b82f6" fill-opacity="0.05" stroke="#3b82f6" stroke-width="1" stroke-dasharray="4 3"/>
  <text x="350" y="55" fill="#60a5fa" font-size="9">제약: E[t] = η</text>
  <!-- Multiple distributions on the constraint -->
  <g fill="#475569" opacity="0.5">
    <circle cx="120" cy="70" r="3"/><circle cx="150" cy="55" r="3"/>
    <circle cx="240" cy="60" r="3"/><circle cx="280" cy="75" r="3"/>
    <circle cx="160" cy="90" r="3"/><circle cx="260" cy="90" r="3"/>
  </g>
  <!-- MaxEnt point (special) -->
  <circle cx="200" cy="72" r="6" fill="#f59e0b" stroke="#f59e0b" stroke-width="1"/>
  <text x="200" y="58" fill="#fbbf24" font-size="10" text-anchor="middle" font-weight="600">최대 엔트로피</text>
  <!-- Arrow pointing to it -->
  <path d="M 140 95 Q 170 100 195 78" stroke="#f59e0b" stroke-width="1" fill="none" marker-end="url(#arr7)"/>
  <text x="130" y="110" fill="#94a3b8" font-size="9">"가장 겸손한 분포"</text>
  <defs>
    <marker id="arr7" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M 0 0 L 6 2.5 L 0 5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
    </marker>
  </defs>
  <!-- Result label -->
  <text x="200" y="140" fill="#64748b" font-size="10" text-anchor="middle">제약을 만족하면서 가장 넓게 펼치면 → 지수족이 나온다</text>
</svg>
