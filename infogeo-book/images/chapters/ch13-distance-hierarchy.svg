<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 260" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg13d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="480" height="260" fill="url(#bg13d)" rx="12"/>
  <text x="240" y="28" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="600">거리의 세 층위: 전역에서 국소로</text>

  <!-- Layer 1: Global - KL divergence -->
  <g transform="translate(40, 50)">
    <rect x="0" y="0" width="400" height="50" rx="10" fill="#8b5cf6" fill-opacity="0.08" stroke="#8b5cf6" stroke-width="1.2"/>
    <text x="20" y="22" fill="#a78bfa" font-size="12" font-weight="600">전역 (비대칭)</text>
    <text x="20" y="40" fill="#94a3b8" font-size="10">KL 발산  D_KL(p‖q) = Σ p log(p/q)</text>
    <text x="350" y="32" fill="#8b5cf6" font-size="10" text-anchor="end" opacity="0.7">비대칭, 삼각부등식 ✗</text>
  </g>

  <!-- Arrow down -->
  <line x1="240" y1="100" x2="240" y2="115" stroke="#64748b" stroke-width="1" marker-end="url(#darr)"/>
  <text x="260" y="112" fill="#64748b" font-size="8">Δθ 줄이면</text>

  <!-- Layer 2: Mid-range - Bregman divergence -->
  <g transform="translate(60, 118)">
    <rect x="0" y="0" width="360" height="50" rx="10" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1.2"/>
    <text x="20" y="22" fill="#60a5fa" font-size="12" font-weight="600">중범위 (볼록 쌍대)</text>
    <text x="20" y="40" fill="#94a3b8" font-size="10">브레그만 발산  D_F(θ‖θ') = F(θ) − F(θ') − ∇F(θ')·(θ−θ')</text>
  </g>

  <!-- Arrow down -->
  <line x1="240" y1="168" x2="240" y2="183" stroke="#64748b" stroke-width="1" marker-end="url(#darr)"/>
  <text x="260" y="180" fill="#64748b" font-size="8">Δθ → 0</text>

  <!-- Layer 3: Local - Fisher metric -->
  <g transform="translate(90, 186)">
    <rect x="0" y="0" width="300" height="50" rx="10" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="1.2"/>
    <text x="20" y="22" fill="#fbbf24" font-size="12" font-weight="600">국소 (리만 계량)</text>
    <text x="20" y="40" fill="#94a3b8" font-size="10">Fisher 정보 행렬  ds² = g_ij dθⁱdθʲ</text>
    <text x="260" y="32" fill="#f59e0b" font-size="10" text-anchor="end" opacity="0.7">대칭, 거리의 공리 ✓</text>
  </g>

  <defs>
    <marker id="darr" markerWidth="8" markerHeight="6" refX="3" refY="6" orient="auto">
      <path d="M 0 0 L 3 6 L 6 0" fill="none" stroke="#64748b" stroke-width="1"/>
    </marker>
  </defs>
</svg>
