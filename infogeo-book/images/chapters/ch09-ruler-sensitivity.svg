<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg9" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="160" fill="url(#bg9)" rx="10"/>
  <!-- Left: sparse grid (low sensitivity, large σ) -->
  <g transform="translate(30,25)">
    <text x="75" y="0" fill="#60a5fa" font-size="10" text-anchor="middle">σ 큰 곳</text>
    <g stroke="#3b82f6" stroke-width="0.5" opacity="0.3">
      <line x1="0" y1="15" x2="150" y2="15"/><line x1="0" y1="45" x2="150" y2="45"/>
      <line x1="0" y1="75" x2="150" y2="75"/><line x1="0" y1="105" x2="150" y2="105"/>
      <line x1="0" y1="15" x2="0" y2="105"/><line x1="50" y1="15" x2="50" y2="105"/>
      <line x1="100" y1="15" x2="100" y2="105"/><line x1="150" y1="15" x2="150" y2="105"/>
    </g>
    <rect x="0" y="15" width="150" height="90" fill="none" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="75" y="125" fill="#94a3b8" font-size="9" text-anchor="middle">한 걸음 = 작은 변화</text>
  </g>
  <!-- Right: dense grid (high sensitivity, small σ) -->
  <g transform="translate(240,25)">
    <text x="75" y="0" fill="#f59e0b" font-size="10" text-anchor="middle">σ 작은 곳</text>
    <g stroke="#f59e0b" stroke-width="0.5" opacity="0.3">
      <line x1="0" y1="15" x2="150" y2="15"/><line x1="0" y1="30" x2="150" y2="30"/>
      <line x1="0" y1="45" x2="150" y2="45"/><line x1="0" y1="60" x2="150" y2="60"/>
      <line x1="0" y1="75" x2="150" y2="75"/><line x1="0" y1="90" x2="150" y2="90"/>
      <line x1="0" y1="105" x2="150" y2="105"/>
      <line x1="0" y1="15" x2="0" y2="105"/><line x1="25" y1="15" x2="25" y2="105"/>
      <line x1="50" y1="15" x2="50" y2="105"/><line x1="75" y1="15" x2="75" y2="105"/>
      <line x1="100" y1="15" x2="100" y2="105"/><line x1="125" y1="15" x2="125" y2="105"/>
      <line x1="150" y1="15" x2="150" y2="105"/>
    </g>
    <rect x="0" y="15" width="150" height="90" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
    <text x="75" y="125" fill="#94a3b8" font-size="9" text-anchor="middle">같은 걸음 = 큰 변화</text>
  </g>
  <!-- Bottom -->
  <text x="210" y="152" fill="#64748b" font-size="10" text-anchor="middle">Fisher 정보 = "이 방향의 한 걸음이 얼마나 민감한가"</text>
</svg>
