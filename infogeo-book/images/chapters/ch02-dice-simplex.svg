<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 200" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg2d" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="200" fill="url(#bg2d)" rx="10"/>
  <!-- Simplex triangle -->
  <g transform="translate(200,105)">
    <polygon points="0,-70 -80,50 80,50" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="1.2"/>
    <!-- Grid lines inside -->
    <line x1="-53" y1="17" x2="53" y2="17" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
    <line x1="-27" y1="-17" x2="27" y2="-17" stroke="#3b82f6" stroke-width="0.4" opacity="0.3"/>
    <line x1="-40" y1="50" x2="0" y2="-70" stroke="#3b82f6" stroke-width="0.4" opacity="0.3" transform="rotate(0)"/>
    <!-- Vertex labels -->
    <text x="0" y="-80" fill="#f59e0b" font-size="10" text-anchor="middle">p₁ = 1</text>
    <text x="-95" y="58" fill="#f59e0b" font-size="10" text-anchor="middle">p₂ = 1</text>
    <text x="95" y="58" fill="#f59e0b" font-size="10" text-anchor="middle">p₃ = 1</text>
    <!-- Sample points -->
    <circle cx="0" cy="10" r="4" fill="#f59e0b" opacity="0.8"/>
    <text x="14" y="14" fill="#fbbf24" font-size="8">균등</text>
    <circle cx="-30" cy="35" r="3" fill="#22c55e" opacity="0.7"/>
    <circle cx="20" cy="-20" r="3" fill="#ef4444" opacity="0.7"/>
    <circle cx="40" cy="30" r="3" fill="#8b5cf6" opacity="0.7"/>
    <!-- Center label -->
    <text x="0" y="80" fill="#94a3b8" font-size="11" text-anchor="middle">모든 가능한 주사위의 지도: 심플렉스</text>
  </g>
</svg>
