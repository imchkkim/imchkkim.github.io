<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 280" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg8b" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <rect width="480" height="280" fill="url(#bg8b)" rx="12"/>
  <text x="240" y="28" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="600">매니폴드: 국소적으로 평면, 전체적으로 곡면</text>

  <!-- Left: Full curved surface -->
  <g transform="translate(20, 45)">
    <!-- Curved surface body -->
    <path d="M 30 140 Q 60 60, 110 80 T 190 100 Q 210 110, 200 150 Q 190 180, 140 170 T 50 160 Z"
          fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="1.5"/>

    <!-- Grid lines on surface to show curvature -->
    <path d="M 50 145 Q 70 90, 110 95 T 185 115" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M 55 155 Q 80 110, 120 110 T 195 130" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M 70 80 Q 75 120, 80 160" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M 120 75 Q 125 115, 130 165" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.3"/>
    <path d="M 170 95 Q 175 130, 175 160" stroke="#3b82f6" stroke-width="0.5" fill="none" opacity="0.3"/>

    <!-- Point of tangency -->
    <circle cx="120" cy="105" r="4" fill="#f59e0b"/>

    <!-- Magnifying glass circle -->
    <circle cx="120" cy="105" r="30" fill="none" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="4 3" opacity="0.6"/>

    <text x="110" y="195" fill="#94a3b8" font-size="11" text-anchor="middle">전체를 보면: 곡면</text>
  </g>

  <!-- Arrow -->
  <g transform="translate(228, 130)">
    <path d="M 0 0 L 30 0" stroke="#f59e0b" stroke-width="1.5" fill="none" marker-end="url(#arr8b)"/>
    <text x="15" y="-10" fill="#f59e0b" font-size="9" text-anchor="middle">확대</text>
  </g>

  <defs>
    <marker id="arr8b" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6" fill="none" stroke="#f59e0b" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Right: Zoomed-in flat tangent plane -->
  <g transform="translate(270, 45)">
    <!-- Tangent plane (flat grid) -->
    <g stroke="#3b82f6" stroke-width="0.4" opacity="0.3">
      <line x1="10" y1="50" x2="180" y2="50"/>
      <line x1="10" y1="80" x2="180" y2="80"/>
      <line x1="10" y1="110" x2="180" y2="110"/>
      <line x1="10" y1="140" x2="180" y2="140"/>
      <line x1="10" y1="170" x2="180" y2="170"/>
      <line x1="35" y1="30" x2="35" y2="190"/>
      <line x1="70" y1="30" x2="70" y2="190"/>
      <line x1="105" y1="30" x2="105" y2="190"/>
      <line x1="140" y1="30" x2="140" y2="190"/>
      <line x1="175" y1="30" x2="175" y2="190"/>
    </g>

    <!-- Flat plane border -->
    <rect x="10" y="30" width="170" height="160" fill="#3b82f6" fill-opacity="0.04" stroke="#60a5fa" stroke-width="1" rx="2"/>

    <!-- Point -->
    <circle cx="105" cy="110" r="5" fill="#f59e0b"/>

    <!-- Coordinate axes at point -->
    <line x1="105" y1="110" x2="170" y2="110" stroke="#22c55e" stroke-width="1.5" marker-end="url(#arr8g)"/>
    <line x1="105" y1="110" x2="105" y2="45" stroke="#8b5cf6" stroke-width="1.5" marker-end="url(#arr8p)"/>

    <text x="172" y="125" fill="#22c55e" font-size="10">∂/∂θ₁</text>
    <text x="112" y="48" fill="#8b5cf6" font-size="10">∂/∂θ₂</text>

    <text x="95" y="215" fill="#94a3b8" font-size="11" text-anchor="middle">가까이 보면: 접평면 ≈ ℝ²</text>
  </g>

  <defs>
    <marker id="arr8g" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6" fill="none" stroke="#22c55e" stroke-width="1"/>
    </marker>
    <marker id="arr8p" markerWidth="8" markerHeight="6" refX="3" refY="0" orient="auto">
      <path d="M 0 8 L 3 0 L 6 8" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    </marker>
  </defs>
</svg>
