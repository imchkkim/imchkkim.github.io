<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 170" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg6" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="170" fill="url(#bg6)" rx="10"/>
  <!-- Convex curve f(x) -->
  <path d="M 60 120 Q 130 30, 210 70 Q 290 110, 360 40" stroke="#f59e0b" stroke-width="2" fill="none"/>
  <text x="370" y="38" fill="#fbbf24" font-size="10">F(θ)</text>
  <!-- Tangent line at a point -->
  <line x1="100" y1="110" x2="300" y2="50" stroke="#3b82f6" stroke-width="1" stroke-dasharray="5 3"/>
  <!-- Point on curve -->
  <circle cx="180" cy="52" r="4" fill="#f59e0b"/>
  <text x="180" y="42" fill="#fbbf24" font-size="9" text-anchor="middle">θ</text>
  <!-- Gap = Bregman divergence -->
  <line x1="260" y1="64" x2="260" y2="90" stroke="#ef4444" stroke-width="1.5"/>
  <text x="275" y="82" fill="#f87171" font-size="9">간격</text>
  <!-- Dual point -->
  <circle cx="260" cy="90" r="3" fill="#3b82f6"/>
  <!-- Labels -->
  <text x="210" y="145" fill="#94a3b8" font-size="10" text-anchor="middle">볼록함수와 접선 사이의 간격 = 브레그만 발산</text>
  <text x="210" y="160" fill="#64748b" font-size="9" text-anchor="middle">기울기를 읽으면 쌍대 좌표 η가 나온다</text>
</svg>
