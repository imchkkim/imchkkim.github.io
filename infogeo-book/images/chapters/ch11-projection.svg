<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 180" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg11" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="180" fill="url(#bg11)" rx="10"/>
  <!-- Model family (flat surface) -->
  <path d="M 40 140 L 160 90 L 360 110 L 240 160 Z" fill="#3b82f6" fill-opacity="0.06" stroke="#3b82f6" stroke-width="1"/>
  <text x="200" y="155" fill="#60a5fa" font-size="9" text-anchor="middle">모형 공간 M</text>
  <!-- True distribution p (above the surface) -->
  <circle cx="200" cy="40" r="6" fill="#ef4444"/>
  <text x="215" y="38" fill="#f87171" font-size="10">p (현실)</text>
  <!-- Projection point on surface -->
  <circle cx="200" cy="115" r="5" fill="#f59e0b"/>
  <text x="215" y="122" fill="#fbbf24" font-size="9">q* (최적 근사)</text>
  <!-- Projection line (perpendicular) -->
  <line x1="200" y1="46" x2="200" y2="110" stroke="#f59e0b" stroke-width="1.5" stroke-dasharray="5 3"/>
  <!-- Right angle mark -->
  <rect x="200" y="105" width="8" height="8" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
  <!-- Label -->
  <text x="200" y="175" fill="#64748b" font-size="10" text-anchor="middle">추론 = 현실에서 모형 위로 수직 사영</text>
</svg>
