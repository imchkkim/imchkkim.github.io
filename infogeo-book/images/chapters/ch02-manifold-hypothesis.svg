<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg2" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow2">
      <feGaussianBlur stdDeviation="2" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="480" height="300" fill="url(#bg2)" rx="12"/>

  <!-- Title -->
  <text x="240" y="28" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="600">매니폴드 가설: 데이터는 얇은 시트 위에 산다</text>

  <!-- 3D bounding box (high-dimensional ambient space) -->
  <g stroke="#334155" stroke-width="0.8" fill="none">
    <!-- Front face -->
    <rect x="40" y="50" width="180" height="210" rx="2"/>
    <!-- Back face offset -->
    <rect x="70" y="35" width="180" height="210" rx="2" opacity="0.4"/>
    <!-- Connecting edges -->
    <line x1="40" y1="50" x2="70" y2="35" opacity="0.4"/>
    <line x1="220" y1="50" x2="250" y2="35" opacity="0.4"/>
    <line x1="220" y1="260" x2="250" y2="245" opacity="0.4"/>
    <line x1="40" y1="260" x2="70" y2="245" opacity="0.4"/>
  </g>
  <text x="130" y="275" fill="#475569" font-size="10" text-anchor="middle">고차원 공간 ℝⁿ</text>

  <!-- Curved manifold sheet inside the box -->
  <path d="M 70 100 C 90 80, 140 130, 170 110 S 210 150, 200 190 C 190 210, 150 180, 120 200 S 80 170, 70 100 Z"
        fill="#3b82f6" fill-opacity="0.12" stroke="#3b82f6" stroke-width="1.5"/>

  <!-- Data points on the manifold -->
  <g fill="#f59e0b" filter="url(#glow2)">
    <circle cx="85" cy="105" r="3"/>
    <circle cx="110" cy="95" r="3"/>
    <circle cx="135" cy="115" r="3"/>
    <circle cx="155" cy="108" r="3"/>
    <circle cx="175" cy="125" r="3"/>
    <circle cx="190" cy="145" r="3"/>
    <circle cx="195" cy="170" r="3"/>
    <circle cx="185" cy="190" r="3"/>
    <circle cx="160" cy="195" r="3"/>
    <circle cx="140" cy="188" r="3"/>
    <circle cx="115" cy="195" r="3"/>
    <circle cx="95" cy="175" r="3"/>
    <circle cx="80" cy="140" r="3"/>
    <circle cx="100" cy="130" r="3"/>
    <circle cx="130" cy="150" r="3"/>
    <circle cx="165" cy="160" r="3"/>
  </g>

  <!-- Right side: unfolded manifold -->
  <g transform="translate(290, 60)">
    <!-- Flat 2D plane -->
    <rect x="0" y="20" width="150" height="100" rx="4" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-width="1"/>

    <!-- Unfolded data points spread out -->
    <g fill="#f59e0b">
      <circle cx="20" cy="40" r="3"/>
      <circle cx="45" cy="35" r="3"/>
      <circle cx="70" cy="50" r="3"/>
      <circle cx="95" cy="42" r="3"/>
      <circle cx="120" cy="55" r="3"/>
      <circle cx="130" cy="75" r="3"/>
      <circle cx="125" cy="95" r="3"/>
      <circle cx="100" cy="100" r="3"/>
      <circle cx="75" cy="105" r="3"/>
      <circle cx="50" cy="98" r="3"/>
      <circle cx="30" cy="85" r="3"/>
      <circle cx="25" cy="65" r="3"/>
      <circle cx="55" cy="70" r="3"/>
      <circle cx="85" cy="75" r="3"/>
      <circle cx="110" cy="68" r="3"/>
      <circle cx="40" cy="55" r="3"/>
    </g>

    <text x="75" y="145" fill="#60a5fa" font-size="10" text-anchor="middle">저차원 좌표 (d ≪ n)</text>

    <!-- Coordinate axes -->
    <line x1="0" y1="120" x2="150" y2="120" stroke="#3b82f6" stroke-width="0.5" opacity="0.5"/>
    <line x1="0" y1="20" x2="0" y2="120" stroke="#3b82f6" stroke-width="0.5" opacity="0.5"/>
  </g>

  <!-- Arrow between left and right -->
  <g>
    <path d="M 260 155 L 285 155" stroke="#8b5cf6" stroke-width="1.5" fill="none" marker-end="url(#arrow)"/>
    <text x="273" y="145" fill="#8b5cf6" font-size="9" text-anchor="middle">펼치기</text>
  </g>

  <defs>
    <marker id="arrow" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <path d="M 0 0 L 8 3 L 0 6" fill="none" stroke="#8b5cf6" stroke-width="1"/>
    </marker>
  </defs>

  <!-- Caption -->
  <text x="365" y="230" fill="#94a3b8" font-size="9" text-anchor="middle">128×128 이미지 → 49,152차원</text>
  <text x="365" y="245" fill="#94a3b8" font-size="9" text-anchor="middle">실제 데이터가 사는 곳 ≪ 49,152</text>
</svg>
