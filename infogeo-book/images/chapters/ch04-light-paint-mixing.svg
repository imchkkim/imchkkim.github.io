<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 440 180" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg4" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="440" height="180" fill="url(#bg4)" rx="10"/>
  <!-- Left: Additive (light) -->
  <g transform="translate(110,80)">
    <circle cx="-18" cy="-10" r="30" fill="#ef4444" fill-opacity="0.35"/>
    <circle cx="18" cy="-10" r="30" fill="#22c55e" fill-opacity="0.35"/>
    <circle cx="0" cy="15" r="30" fill="#3b82f6" fill-opacity="0.35"/>
    <circle cx="0" cy="0" r="10" fill="#fff" fill-opacity="0.25"/>
    <text x="0" y="60" fill="#f59e0b" font-size="11" text-anchor="middle" font-weight="600">빛을 섞는다</text>
    <text x="0" y="75" fill="#94a3b8" font-size="9" text-anchor="middle">덧셈의 길 (m-혼합)</text>
  </g>
  <!-- Center: vs -->
  <text x="220" y="85" fill="#475569" font-size="14" text-anchor="middle">vs</text>
  <!-- Right: Subtractive (paint/filter) -->
  <g transform="translate(330,80)">
    <circle cx="-18" cy="-10" r="30" fill="#06b6d4" fill-opacity="0.4"/>
    <circle cx="18" cy="-10" r="30" fill="#d946ef" fill-opacity="0.4"/>
    <circle cx="0" cy="15" r="30" fill="#eab308" fill-opacity="0.4"/>
    <circle cx="0" cy="0" r="10" fill="#1e293b" fill-opacity="0.6"/>
    <text x="0" y="60" fill="#8b5cf6" font-size="11" text-anchor="middle" font-weight="600">물감을 섞는다</text>
    <text x="0" y="75" fill="#94a3b8" font-size="9" text-anchor="middle">곱셈의 길 (e-혼합)</text>
  </g>
</svg>
