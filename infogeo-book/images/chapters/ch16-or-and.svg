<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 420 160" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg16" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="420" height="160" fill="url(#bg16)" rx="10"/>
  <!-- Left: OR (broadening) -->
  <g transform="translate(30,25)">
    <text x="85" y="0" fill="#3b82f6" font-size="11" text-anchor="middle" font-weight="600">넓히기 (OR)</text>
    <!-- Two small distributions -->
    <path d="M 20 90 Q 35 40, 50 90" stroke="#60a5fa" stroke-width="1" fill="#3b82f6" fill-opacity="0.1"/>
    <path d="M 100 90 Q 115 50, 130 90" stroke="#60a5fa" stroke-width="1" fill="#3b82f6" fill-opacity="0.1"/>
    <text x="50" y="100" fill="#64748b" font-size="8" text-anchor="middle">A</text>
    <text x="115" y="100" fill="#64748b" font-size="8" text-anchor="middle">B</text>
    <!-- Arrow down -->
    <text x="85" y="80" fill="#3b82f6" font-size="14" text-anchor="middle">+</text>
    <!-- Wide merged -->
    <path d="M 10 115 Q 45 100, 85 95 Q 125 100, 155 115" stroke="#3b82f6" stroke-width="1.5" fill="#3b82f6" fill-opacity="0.06"/>
    <text x="85" y="128" fill="#60a5fa" font-size="9" text-anchor="middle">A 또는 B 가능</text>
  </g>
  <!-- Center divider -->
  <line x1="210" y1="20" x2="210" y2="140" stroke="#334155" stroke-width="0.5"/>
  <!-- Right: AND (narrowing) -->
  <g transform="translate(230,25)">
    <text x="85" y="0" fill="#ef4444" font-size="11" text-anchor="middle" font-weight="600">좁히기 (AND)</text>
    <!-- Two overlapping distributions -->
    <path d="M 20 90 Q 55 30, 100 90" stroke="#f87171" stroke-width="1" fill="#ef4444" fill-opacity="0.08"/>
    <path d="M 60 90 Q 95 35, 140 90" stroke="#f87171" stroke-width="1" fill="#ef4444" fill-opacity="0.08"/>
    <!-- Arrow down -->
    <text x="85" y="80" fill="#ef4444" font-size="14" text-anchor="middle">×</text>
    <!-- Narrow product -->
    <path d="M 55 115 Q 75 98, 85 95 Q 95 98, 110 115" stroke="#ef4444" stroke-width="1.5" fill="#ef4444" fill-opacity="0.1"/>
    <text x="85" y="128" fill="#f87171" font-size="9" text-anchor="middle">A 그리고 B</text>
  </g>
  <text x="210" y="152" fill="#64748b" font-size="10" text-anchor="middle">프리트레인 = OR로 넓히고,  강화학습 = AND로 좁힌다</text>
</svg>
