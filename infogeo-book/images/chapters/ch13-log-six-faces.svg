<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 520 420" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg13" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <filter id="glow13">
      <feGaussianBlur stdDeviation="4" result="blur"/>
      <feComposite in="SourceGraphic" in2="blur" operator="over"/>
    </filter>
  </defs>

  <rect width="520" height="420" fill="url(#bg13)" rx="12"/>
  <text x="260" y="30" fill="#e2e8f0" font-size="15" text-anchor="middle" font-weight="600">log의 여섯 얼굴</text>

  <!-- Central hub: log curve -->
  <g transform="translate(210, 170)">
    <circle cx="50" cy="40" r="48" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-width="2" filter="url(#glow13)"/>
    <text x="50" y="35" fill="#f59e0b" font-size="18" text-anchor="middle" font-weight="700">log</text>
    <text x="50" y="55" fill="#fbbf24" font-size="10" text-anchor="middle" opacity="0.7">x</text>
  </g>

  <!-- Spokes and labels -->
  <!-- 1. Top-left: 곱→합 번역기 -->
  <line x1="230" y1="180" x2="100" y2="80" stroke="#3b82f6" stroke-width="1.2" opacity="0.5"/>
  <g transform="translate(30, 50)">
    <rect x="0" y="0" width="120" height="48" rx="8" fill="#3b82f6" fill-opacity="0.1" stroke="#3b82f6" stroke-width="0.8"/>
    <text x="60" y="20" fill="#60a5fa" font-size="11" text-anchor="middle" font-weight="600">① 곱→합 번역기</text>
    <text x="60" y="38" fill="#94a3b8" font-size="9" text-anchor="middle">log(ab) = log a + log b</text>
  </g>

  <!-- 2. Top-right: 놀라움의 척도 -->
  <line x1="290" y1="180" x2="400" y2="80" stroke="#8b5cf6" stroke-width="1.2" opacity="0.5"/>
  <g transform="translate(350, 50)">
    <rect x="0" y="0" width="140" height="48" rx="8" fill="#8b5cf6" fill-opacity="0.1" stroke="#8b5cf6" stroke-width="0.8"/>
    <text x="70" y="20" fill="#a78bfa" font-size="11" text-anchor="middle" font-weight="600">② 놀라움의 척도</text>
    <text x="70" y="38" fill="#94a3b8" font-size="9" text-anchor="middle">−log p = "얼마나 놀라운가"</text>
  </g>

  <!-- 3. Middle-left: 볼록성의 원천 -->
  <line x1="220" y1="210" x2="80" y2="210" stroke="#22c55e" stroke-width="1.2" opacity="0.5"/>
  <g transform="translate(0, 185)">
    <rect x="0" y="0" width="120" height="48" rx="8" fill="#22c55e" fill-opacity="0.1" stroke="#22c55e" stroke-width="0.8"/>
    <text x="60" y="20" fill="#4ade80" font-size="11" text-anchor="middle" font-weight="600">③ 볼록성의 원천</text>
    <text x="60" y="38" fill="#94a3b8" font-size="9" text-anchor="middle">−log: 볼록 → 쌍대 구조</text>
  </g>

  <!-- 4. Middle-right: 지수족의 골격 -->
  <line x1="300" y1="210" x2="420" y2="210" stroke="#ef4444" stroke-width="1.2" opacity="0.5"/>
  <g transform="translate(380, 185)">
    <rect x="0" y="0" width="130" height="48" rx="8" fill="#ef4444" fill-opacity="0.1" stroke="#ef4444" stroke-width="0.8"/>
    <text x="65" y="20" fill="#f87171" font-size="11" text-anchor="middle" font-weight="600">④ 지수족의 골격</text>
    <text x="65" y="38" fill="#94a3b8" font-size="9" text-anchor="middle">p = exp(θ·t − F(θ))</text>
  </g>

  <!-- 5. Bottom-left: 민감도의 재료 -->
  <line x1="230" y1="240" x2="100" y2="330" stroke="#06b6d4" stroke-width="1.2" opacity="0.5"/>
  <g transform="translate(20, 310)">
    <rect x="0" y="0" width="135" height="48" rx="8" fill="#06b6d4" fill-opacity="0.1" stroke="#06b6d4" stroke-width="0.8"/>
    <text x="68" y="20" fill="#22d3ee" font-size="11" text-anchor="middle" font-weight="600">⑤ 민감도의 재료</text>
    <text x="68" y="38" fill="#94a3b8" font-size="9" text-anchor="middle">∂log p/∂θ = 스코어 함수</text>
  </g>

  <!-- 6. Bottom-right: 경사의 정규화기 -->
  <line x1="290" y1="240" x2="400" y2="330" stroke="#f97316" stroke-width="1.2" opacity="0.5"/>
  <g transform="translate(350, 310)">
    <rect x="0" y="0" width="145" height="48" rx="8" fill="#f97316" fill-opacity="0.1" stroke="#f97316" stroke-width="0.8"/>
    <text x="73" y="20" fill="#fb923c" font-size="11" text-anchor="middle" font-weight="600">⑥ 경사의 정규화기</text>
    <text x="73" y="38" fill="#94a3b8" font-size="9" text-anchor="middle">자연경사 = F⁻¹∇log L</text>
  </g>

  <!-- Bottom subtitle -->
  <text x="260" y="400" fill="#64748b" font-size="10" text-anchor="middle">하나의 곡선이 정보기하학 전체를 관통한다</text>
</svg>
