<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 400 170" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg17" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/><stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>
  <rect width="400" height="170" fill="url(#bg17)" rx="10"/>
  <!-- Left: vanilla gradient (distorted) -->
  <g transform="translate(30,20)">
    <text x="70" y="10" fill="#64748b" font-size="10" text-anchor="middle">일반 경사</text>
    <!-- Elongated elliptic contours -->
    <ellipse cx="70" cy="65" rx="60" ry="20" fill="none" stroke="#475569" stroke-width="0.5" transform="rotate(-30 70 65)"/>
    <ellipse cx="70" cy="65" rx="40" ry="13" fill="none" stroke="#475569" stroke-width="0.5" transform="rotate(-30 70 65)"/>
    <ellipse cx="70" cy="65" rx="20" ry="7" fill="none" stroke="#475569" stroke-width="0.5" transform="rotate(-30 70 65)"/>
    <!-- Zigzag descent -->
    <polyline points="30,35 55,70 40,55 60,80 50,70 65,65" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-linejoin="round"/>
    <circle cx="30" cy="35" r="3" fill="#ef4444"/>
    <text x="70" y="110" fill="#f87171" font-size="9" text-anchor="middle">지그재그</text>
  </g>
  <!-- Right: natural gradient (direct) -->
  <g transform="translate(220,20)">
    <text x="70" y="10" fill="#f59e0b" font-size="10" text-anchor="middle">자연 경사</text>
    <!-- Circular contours (metric-corrected) -->
    <circle cx="70" cy="65" r="40" fill="none" stroke="#475569" stroke-width="0.5"/>
    <circle cx="70" cy="65" r="27" fill="none" stroke="#475569" stroke-width="0.5"/>
    <circle cx="70" cy="65" r="14" fill="none" stroke="#475569" stroke-width="0.5"/>
    <!-- Direct descent -->
    <line x1="40" y1="40" x2="68" y2="63" stroke="#f59e0b" stroke-width="2" marker-end="url(#arr17)"/>
    <circle cx="40" cy="40" r="3" fill="#f59e0b"/>
    <text x="70" y="110" fill="#fbbf24" font-size="9" text-anchor="middle">직선 하강</text>
  </g>
  <defs>
    <marker id="arr17" markerWidth="6" markerHeight="5" refX="6" refY="2.5" orient="auto">
      <path d="M 0 0 L 6 2.5 L 0 5" fill="none" stroke="#f59e0b" stroke-width="0.8"/>
    </marker>
  </defs>
  <text x="200" y="155" fill="#64748b" font-size="10" text-anchor="middle">Fisher 계량으로 보정하면 — 나침반이 진북을 가리킨다</text>
</svg>
