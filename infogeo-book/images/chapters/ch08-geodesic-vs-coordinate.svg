<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 480 300" font-family="'Noto Sans KR', sans-serif">
  <defs>
    <linearGradient id="bg8" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
    <radialGradient id="sphere" cx="50%" cy="40%" r="50%">
      <stop offset="0%" stop-color="#3b82f6" stop-opacity="0.2"/>
      <stop offset="100%" stop-color="#1e3a5f" stop-opacity="0.05"/>
    </radialGradient>
  </defs>

  <rect width="480" height="300" fill="url(#bg8)" rx="12"/>
  <text x="240" y="28" fill="#e2e8f0" font-size="14" text-anchor="middle" font-weight="600">좌표 위의 직선 ≠ 곡면 위의 최단 경로</text>

  <!-- Left panel: Globe view -->
  <g transform="translate(10, 40)">
    <!-- Sphere outline -->
    <ellipse cx="110" cy="120" rx="95" ry="95" fill="url(#sphere)" stroke="#3b82f6" stroke-width="1" opacity="0.6"/>
    <!-- Equator -->
    <ellipse cx="110" cy="120" rx="95" ry="25" fill="none" stroke="#334155" stroke-width="0.5" stroke-dasharray="3 3"/>
    <!-- Meridian -->
    <ellipse cx="110" cy="120" rx="25" ry="95" fill="none" stroke="#334155" stroke-width="0.5" stroke-dasharray="3 3"/>

    <!-- Two points on sphere -->
    <circle cx="55" cy="75" r="5" fill="#f59e0b"/>
    <text x="40" y="65" fill="#f59e0b" font-size="10">A</text>
    <circle cx="170" cy="90" r="5" fill="#22c55e"/>
    <text x="178" y="85" fill="#22c55e" font-size="10">B</text>

    <!-- Geodesic (great circle arc) -->
    <path d="M 55 75 Q 110 50, 170 90" stroke="#f59e0b" stroke-width="2.5" fill="none"/>
    <text x="110" y="45" fill="#f59e0b" font-size="9" text-anchor="middle">측지선 (대원)</text>

    <!-- "Straight" in lat/lon (not shortest) -->
    <path d="M 55 75 Q 110 82, 170 90" stroke="#ef4444" stroke-width="1.5" fill="none" stroke-dasharray="5 3"/>
    <text x="110" y="98" fill="#ef4444" font-size="9" text-anchor="middle">좌표상 직선</text>

    <text x="110" y="240" fill="#94a3b8" font-size="11" text-anchor="middle">구면 위의 두 경로</text>
  </g>

  <!-- Right panel: Flat map (Mercator-like) -->
  <g transform="translate(250, 50)">
    <!-- Grid -->
    <rect x="0" y="0" width="200" height="180" fill="none" stroke="#334155" stroke-width="0.8" rx="4"/>
    <g stroke="#1e293b" stroke-width="0.5">
      <line x1="40" y1="0" x2="40" y2="180"/>
      <line x1="80" y1="0" x2="80" y2="180"/>
      <line x1="120" y1="0" x2="120" y2="180"/>
      <line x1="160" y1="0" x2="160" y2="180"/>
      <line x1="0" y1="36" x2="200" y2="36"/>
      <line x1="0" y1="72" x2="200" y2="72"/>
      <line x1="0" y1="108" x2="200" y2="108"/>
      <line x1="0" y1="144" x2="200" y2="144"/>
    </g>

    <!-- Points in flat coordinates -->
    <circle cx="30" cy="50" r="5" fill="#f59e0b"/>
    <text x="18" y="42" fill="#f59e0b" font-size="10">A</text>
    <circle cx="175" cy="65" r="5" fill="#22c55e"/>
    <text x="183" y="60" fill="#22c55e" font-size="10">B</text>

    <!-- Coordinate straight line -->
    <line x1="30" y1="50" x2="175" y2="65" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3"/>

    <!-- Geodesic projected onto flat map (curves up) -->
    <path d="M 30 50 Q 100 20, 175 65" stroke="#f59e0b" stroke-width="2.5" fill="none"/>

    <!-- Labels -->
    <text x="200" y="196" fill="#64748b" font-size="9" text-anchor="end">경도 →</text>
    <text x="-5" y="-5" fill="#64748b" font-size="9">위도 ↑</text>

    <text x="100" y="220" fill="#94a3b8" font-size="11" text-anchor="middle">지도(좌표) 위의 두 경로</text>
  </g>

  <!-- Legend -->
  <g transform="translate(170, 276)">
    <line x1="0" y1="0" x2="20" y2="0" stroke="#f59e0b" stroke-width="2.5"/>
    <text x="25" y="4" fill="#f59e0b" font-size="9">실제 최단 경로 (측지선)</text>
    <line x1="150" y1="0" x2="170" y2="0" stroke="#ef4444" stroke-width="1.5" stroke-dasharray="5 3"/>
    <text x="175" y="4" fill="#ef4444" font-size="9">좌표상 직선</text>
  </g>
</svg>
