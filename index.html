<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>lameproof</title>
    <style>/* lameproof.com — Root Index */
:root {
    --bg-color: #ffffff;
    --text-color: #24292f;
    --text-secondary: #656d76;
    --link-color: #0969da;
    --border-color: #d0d7de;
    --card-bg: #f6f8fa;
    --card-hover: #eef1f4;
}

@media (prefers-color-scheme: dark) {
    :root {
        --bg-color: #0d1117;
        --text-color: #c9d1d9;
        --text-secondary: #8b949e;
        --link-color: #58a6ff;
        --border-color: #30363d;
        --card-bg: #161b22;
        --card-hover: #1c2128;
    }
}

* {
    box-sizing: border-box;
    margin: 0;
    padding: 0;
}

body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
    line-height: 1.6;
    color: var(--text-color);
    background-color: var(--bg-color);
    max-width: 800px;
    margin: 0 auto;
    padding: 3rem 1rem;
}

header {
    margin-bottom: 3rem;
    text-align: center;
}

header h1 {
    font-size: 2.5rem;
    font-weight: 700;
    margin-bottom: 0.5rem;
    letter-spacing: -0.02em;
}

header p {
    color: var(--text-secondary);
    font-size: 1.1rem;
}

section {
    margin-bottom: 2.5rem;
}

section h2 {
    font-size: 1.1rem;
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.05em;
    color: var(--text-secondary);
    margin-bottom: 1rem;
    padding-bottom: 0.5rem;
    border-bottom: 1px solid var(--border-color);
}

.card-list {
    display: flex;
    flex-direction: column;
    gap: 0.75rem;
}

.card {
    display: block;
    padding: 1.25rem 1.5rem;
    background: var(--card-bg);
    border: 1px solid var(--border-color);
    border-radius: 0.5rem;
    text-decoration: none;
    color: var(--text-color);
    transition: background 0.15s, transform 0.15s;
}

.card:hover {
    background: var(--card-hover);
    transform: translateY(-1px);
}

.card h3 {
    font-size: 1.2rem;
    font-weight: 600;
    margin-bottom: 0.25rem;
}

.card p {
    color: var(--text-secondary);
    font-size: 0.9rem;
}

footer {
    text-align: center;
    padding-top: 2rem;
    border-top: 1px solid var(--border-color);
    color: var(--text-secondary);
    font-size: 0.85rem;
}

@media (max-width: 640px) {
    body {
        padding: 2rem 0.75rem;
    }
    header h1 {
        font-size: 2rem;
    }
}
</style>
</head>
<body>
    <header>
        <h1>lameproof</h1>
    </header>

    <section>
        <h2>Books</h2>
        <div class="card-list">
        <a class="card" href="/genrl-book">
            <h3>생성모델의 강화학습</h3>
            <p>DPO에서 GRPO까지</p>
        </a>
        <a class="card" href="/infogeo-book">
            <h3>정보기하학</h3>
            <p>정보기하학 시각화</p>
        </a>
        </div>
    </section>

    <section>
        <h2>Blog</h2>
        <div class="card-list">
        <a class="card" href="/blog">
            <h3>Blog</h3>
            <p>MindForest에서 퍼블리싱한 글</p>
        </a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026</p>
    </footer>
</body>
</html>
