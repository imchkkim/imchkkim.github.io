<html lang="ko">
<head>

    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/katex@0.16.11/dist/katex.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <script>hljs.highlightAll();</script>
</head>
<body>
    <button id="theme-toggle" aria-label="다크모드 전환">&#x1F319;</button>
    <header>
        <nav>
            <a href="../index.html">← 목록으로</a>
        </nav>
    </header>
    <main>
        <article>
            <h1>두번째 문서 퍼블리싱</h1>

                <time datetime="2026-03-25T05:38:05.090Z">2026. 3. 25.</time>
                <div class="tags">
                    <span class="tag">drafts</span>
                </div>
            </div>
            <div class="content">
                <p>두번째 문서 퍼블리싱</p>
<ul>
<li>역시 테스트</li>

</li>
<li>몇가지 더 테스트 합니다</li>

            </div>
        </article>
    </main>
    <footer>
        <p>Published with MindForest</p>
    </footer>
    <script type="module">
    import mermaid from 'https://cdn.jsdelivr.net/npm/mermaid@11/dist/mermaid.esm.min.mjs';
    const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
    mermaid.initialize({ startOnLoad: false, theme: isDark ? 'dark' : 'default', securityLevel: 'loose' });
    mermaid.run();
    </script>
    <script>
    const toggle = document.getElementById('theme-toggle');
    const stored = localStorage.getItem('theme');
    if (stored === 'dark' || (!stored && matchMedia('(prefers-color-scheme: dark)').matches)) {
      document.documentElement.setAttribute('data-theme', 'dark');
      toggle.textContent = '\u2600\uFE0F';
    }
    toggle.addEventListener('click', () => {
      const isDark = document.documentElement.getAttribute('data-theme') === 'dark';
      document.documentElement.setAttribute('data-theme', isDark ? 'light' : 'dark');
      localStorage.setItem('theme', isDark ? 'light' : 'dark');
      toggle.textContent = isDark ? '\u{1F319}' : '\u2600\uFE0F';
    });
    </script>
</body>
</html>
